template:

  - switch:

# =========================
# JK BMS1 CHARGE
# UINT32 @ 0x1070
# =========================

      - name: "JK BMS1 Charge"
        unique_id: "jk_bms1_charge_switch"

        state: >
          {{ states('sensor.jk_bms1_charge_status') | int(0) == 1 }}

        turn_on:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1070
            value:
              - 1
              - 0

        turn_off:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1070
            value:
              - 0
              - 0

# =========================
# JK BMS1 DISCHARGE
# UINT32 @ 0x1074
# =========================

      - name: "JK BMS1 Discharge"
        unique_id: "jk_bms1_discharge_switch"

        state: >
          {{ states('sensor.jk_bms1_discharge_status') | int(0) == 1 }}

        turn_on:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1074
            value:
              - 1
              - 0

        turn_off:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1074
            value:
              - 0
              - 0

# =========================
# JK BMS1 BALANCE
# UINT32 @ 0x1078
# =========================

      - name: "JK BMS1 Balance"
        unique_id: "jk_bms1_balance_switch"

        state: >
          {{ states('sensor.jk_bms1_balance_status') | int(0) == 1 }}

        turn_on:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1078
            value:
              - 1
              - 0

        turn_off:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x1078
            value:
              - 0
              - 0

# =========================
# JK BMS1 CHARGING FLOAT MODE
# BIT9 @ 0x0114
# =========================

      - name: "JK BMS1 Charging Float Mode"
        unique_id: "jk_bms1_charging_float_mode_switch"

        state: >
          {{ ((states('sensor.jk_bms1_control_flags') | int(0)) // 512) % 2 == 1 }}

        turn_on:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x0114
            value: >
              {% set val = states('sensor.jk_bms1_control_flags') | int(0) %}
              {{ val if ((val // 512) % 2 == 1) else val + 512 }}

        turn_off:
          service: modbus.write_register
          data:
            hub: jk_bms
            slave: 1
            address: 0x0114
            value: >
              {% set val = states('sensor.jk_bms1_control_flags') | int(0) %}
              {{ val if ((val // 512) % 2 == 0) else val - 512 }}

